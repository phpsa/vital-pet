version: "3.8"

services:
  mysql:
    container_name: demostore-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    volumes:
      - storage:/var/lib/mysql

  caddy:
    container_name: demostore-caddy
    image: caddy:latest
    restart: unless-stopped
    ports:
        - "80:80"
        - "443:443"
        - "443:443/udp"
    volumes:
        - $PWD/docker/caddy/Caddyfile:/etc/caddy/Caddyfile
        - ./:/var/www/
    depends_on:
        - mysql

  php-fpm:
    container_name: demostore-php-fpm
    build:
      target: php-fpm
    restart: unless-stopped
    environment:
      - ADMIN_FIRSTNAME=${ADMIN_FIRSTNAME}
      - ADMIN_LASTNAME=${ADMIN_LASTNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./:/var/www/:rw,cached
    depends_on:
      - mysql

  redis:
    container_name: demostore-redis
    image: redis:latest
    restart: unless-stopped
    ports:
        - "${REDIS_PORT}:${REDIS_PORT}"

  mailhog:
    container_name: demostore-mailhog
    image: 'mailhog/mailhog:latest'
    ports:
        - '1025:1025'
        - '8025:8025'

volumes:
  storage:
